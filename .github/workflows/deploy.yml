name: Deploy (Generic Home Server)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Optional: deploy a specific image tag (e.g. a git SHA). Leave empty for latest."
        required: false
        default: ""

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  APP_NAME: chaos-app
  SERVER_HOST: ssh.CHANGEME.com # TODO: set your server hostname
  DEPLOY_USER: infra
  DEPLOY_PATH: /opt/apps/chaos-app/deploy

  IMAGE: ghcr.io/${{ github.repository_owner }}/chaos-app

  HEALTH_CONTAINER: chaos-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            NODE_ENV=production

      - name: Install cloudflared
        run: |
          wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb
          sudo dpkg -i cloudflared-linux-amd64.deb
          cloudflared --version

      - name: Setup SSH (Cloudflare Access)
        env:
          CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > /dev/null

          cat > ~/.ssh/cloudflared-wrapper.sh << 'WRAPPER'
          #!/bin/bash
          set -euo pipefail
          cloudflared access ssh \
            --hostname "$1" \
            --id "$CF_ACCESS_CLIENT_ID" \
            --secret "$CF_ACCESS_CLIENT_SECRET"
          WRAPPER
          chmod +x ~/.ssh/cloudflared-wrapper.sh

          cat > ~/.ssh/config << EOF
          Host home-deploy
            HostName ${{ env.SERVER_HOST }}
            User ${{ env.DEPLOY_USER }}
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            BatchMode yes
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            ProxyCommand ~/.ssh/cloudflared-wrapper.sh %h
          EOF
          chmod 600 ~/.ssh/config

      - name: Copy compose file to server
        run: |
          scp docker-compose.prod.yml home-deploy:${{ env.DEPLOY_PATH }}/docker-compose.prod.yml

      - name: Deploy on server (pull + restart + health + rollback)
        env:
          DEPLOY_PATH: ${{ env.DEPLOY_PATH }}
          IMAGE: ${{ env.IMAGE }}
          HEALTH_CONTAINER: ${{ env.HEALTH_CONTAINER }}
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          ssh home-deploy "bash -s" << 'REMOTE'
          set -euo pipefail

          : "${DEPLOY_PATH:?missing}"
          : "${IMAGE:?missing}"

          TAG="${IMAGE_TAG:-latest}"
          FULL_IMAGE="${IMAGE}:${TAG}"

          echo "==== Deploy started: $(date) ===="
          echo "Deploying image: $FULL_IMAGE"

          mkdir -p "$DEPLOY_PATH"
          cd "$DEPLOY_PATH"

          # Save current deployed tag for rollback (if present)
          PREV_TAG_FILE=".prev_image_tag"
          PREV_TAG="$(cat "$PREV_TAG_FILE" 2>/dev/null || true)"
          echo "Previous tag: ${PREV_TAG:-none}"

          echo "==== Writing runtime .env (server-side) ===="
          cat > .env <<EOF
          NODE_ENV=production
          IMAGE=${FULL_IMAGE}
          EOF
          chmod 600 .env

          echo "==== Pull + restart ===="
          docker compose --env-file .env -f docker-compose.prod.yml pull
          docker compose --env-file .env -f docker-compose.prod.yml up -d --force-recreate

          echo "==== Health check ===="
          if docker inspect "$HEALTH_CONTAINER" >/dev/null 2>&1; then
            for i in {1..20}; do
              status=$(docker inspect --format='{{.State.Health.Status}}' "$HEALTH_CONTAINER" 2>/dev/null || echo "no-healthcheck")
              if [ "$status" = "healthy" ] || [ "$status" = "no-healthcheck" ]; then
                echo "Health status: $status"
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "Health failed. Logs:"
                docker logs --tail 200 "$HEALTH_CONTAINER" || true

                if [ -n "${PREV_TAG:-}" ]; then
                  echo "==== ROLLBACK: deploying previous tag ${PREV_TAG} ===="
                  cat > .env <<EOF
          NODE_ENV=production
          IMAGE=${IMAGE}:${PREV_TAG}
          EOF
                  chmod 600 .env
                  docker compose --env-file .env -f docker-compose.prod.yml pull
                  docker compose --env-file .env -f docker-compose.prod.yml up -d --force-recreate
                  echo "Rollback completed"
                fi
                exit 1
              fi
              echo "Waiting... ($i/20) status: $status"
              sleep 3
            done
          else
            echo "HEALTH_CONTAINER not found; skipping health check"
          fi

          echo "==== Persist deployed tag for next rollback ===="
          echo "$TAG" > "$PREV_TAG_FILE"

          echo "==== Cleanup ===="
          docker image prune -f
          docker compose -f docker-compose.prod.yml ps

          echo "==== Deploy completed: $(date) ===="
          REMOTE

      - name: Cleanup key
        if: always()
        run: rm -f ~/.ssh/deploy_key ~/.ssh/config ~/.ssh/cloudflared-wrapper.sh
