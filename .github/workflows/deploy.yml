name: Deploy to Production

on:
  push:
    branches: [master, main]
  workflow_call:
  workflow_dispatch:

jobs:
  build-and-push:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/hammediora/chaos-app:latest
            ghcr.io/hammediora/chaos-app:${{ github.sha }}

  deploy:
    name: Deploy on the-boss
    runs-on: ubuntu-latest
    needs: build-and-push
    env:
      SSH_DIR: $RUNNER_TEMP/ssh

    steps:
      - name: Preflight host reachability
        shell: bash
        run: |
          set -euo pipefail
          if ! timeout 10 bash -c "cat < /dev/null > /dev/tcp/${{ secrets.SSH_HOST }}/${{ secrets.SSH_PORT }}"; then
            echo "Cannot reach ${{ secrets.SSH_HOST }}:${{ secrets.SSH_PORT }} from GitHub-hosted runner."
            echo "Use a publicly reachable SSH endpoint, Cloudflare Access for SSH, or switch deploy job to self-hosted runner on your network."
            exit 1
          fi

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$SSH_DIR"
          chmod 700 "$SSH_DIR"
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > "$SSH_DIR/id_ed25519"
          chmod 600 "$SSH_DIR/id_ed25519"
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" -H "${{ secrets.SSH_HOST }}" > "$SSH_DIR/known_hosts"

      - name: Deploy on server
        shell: bash
        run: |
          set -euo pipefail
          ssh -p "${{ secrets.SSH_PORT }}" -i "$SSH_DIR/id_ed25519" -o UserKnownHostsFile="$SSH_DIR/known_hosts" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" << 'EOF'
          set -euo pipefail

          APP_DIR="$HOME/apps/chaos-app"
          COMPOSE_FILE="docker-compose.yml"
          mkdir -p "$APP_DIR"
          cd "$APP_DIR"

          cat > "$COMPOSE_FILE" << 'COMPOSE_EOF'
          services:
            app:
              image: ghcr.io/hammediora/chaos-app:latest
              container_name: chaos-app
              restart: unless-stopped
              ports:
                - "127.0.0.1:3030:3000"
              env_file:
                - .env
          COMPOSE_EOF

          cat > .env << ENV_EOF
          NODE_ENV=production
          IMGFLIP_USERNAME=${{ secrets.IMGFLIP_USERNAME }}
          IMGFLIP_PASSWORD=${{ secrets.IMGFLIP_PASSWORD }}
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          ENV_EOF

          if [ -n "${{ secrets.GHCR_PAT || '' }}" ] && [ -n "${{ secrets.GHCR_USERNAME || '' }}" ]; then
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
          fi

          docker compose -f "$COMPOSE_FILE" pull
          docker compose -f "$COMPOSE_FILE" up -d --remove-orphans

          echo "==> Health check on 127.0.0.1:3030"
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3030/ >/dev/null 2>&1; then
              echo "App is healthy"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Health check failed"
              docker compose -f "$COMPOSE_FILE" logs app --tail 80
              exit 1
            fi
            sleep 2
          done

          docker image prune -af --filter 'until=168h'
          EOF

      - name: Remove SSH key
        if: always()
        shell: bash
        run: rm -rf "$SSH_DIR"
